# Deploy the gctl HTTP indexer to Fly.io (remote build — no local Docker).
#
# One-time: GitHub → Settings → Secrets → Actions → add FLY_API_TOKEN
#   Create token: fly auth login && fly orgs list && fly tokens create org -o YOUR_ORG_SLUG
#   (Use an org token for CI; `fly tokens create deploy` requires an existing app: -a APP_NAME.)
#
# Then: Actions → "Deploy gctl indexer (Fly.io)" → Run workflow → enter a globally unique app name.
# Finally: Vercel → INDEXER_URL = https://<that-app-name>.fly.dev

name: Deploy gctl indexer (Fly.io)

on:
  workflow_dispatch:
    inputs:
      fly_app:
        description: Globally unique Fly app name (e.g. gctl-indexer-gdev27)
        required: true
        type: string

concurrency:
  group: deploy-indexer-${{ github.event.inputs.fly_app }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate token and app name
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_INDEXER_APP: ${{ github.event.inputs.fly_app }}
        run: |
          set -e
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "::error::Add repo secret FLY_API_TOKEN. Run: fly auth login && fly tokens create"
            exit 1
          fi
          if ! echo "$FLY_INDEXER_APP" | grep -qE '^[a-z][a-z0-9-]{1,50}$'; then
            echo "::error::App name must be lowercase letters, digits, hyphens; start with a letter."
            exit 1
          fi

      - name: Create Fly app if needed
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_INDEXER_APP: ${{ github.event.inputs.fly_app }}
        run: flyctl apps create "$FLY_INDEXER_APP" 2>/dev/null || true

      - name: Deploy (remote build)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_INDEXER_APP: ${{ github.event.inputs.fly_app }}
        run: flyctl deploy --config fly.indexer.toml --remote-only --app "$FLY_INDEXER_APP"

      - name: Summary — set this on Vercel
        env:
          FLY_INDEXER_APP: ${{ github.event.inputs.fly_app }}
        run: |
          URL="https://${FLY_INDEXER_APP}.fly.dev"
          {
            echo "## Indexer deployed"
            echo "Set **only** this on Vercel (Production + Preview if needed):"
            echo ""
            echo "| Name | Value |"
            echo "|------|-------|"
            echo "| \`INDEXER_URL\` | \`$URL\` |"
            echo ""
            echo "Health check: [$URL/health]($URL/health)"
          } >> "$GITHUB_STEP_SUMMARY"
