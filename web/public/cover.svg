<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05070a" />
      <stop offset="40%" stop-color="#0d1018" />
      <stop offset="100%" stop-color="#081018" />
    </linearGradient>
    <radialGradient id="rim" cx="50%" cy="34%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="hsla(76, 100%, 55%, 0.11)" />
      <stop offset="55%" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="hsla(76, 100%, 50%, 0.06)" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)" />
  <rect width="640" height="360" fill="url(#rim)" />
  <rect width="640" height="360" fill="url(#floor)" />

  <!-- depth grid -->
  <g opacity="0.09" stroke="hsl(210 20% 40%)" stroke-width="0.4">
    <path d="M0 120 H640 M0 200 H640 M0 280 H640" />
    <path d="M106 0 V360 M213 0 V360 M320 0 V360 M427 0 V360 M534 0 V360" />
  </g>

  <!-- narrative flow ribbon -->
  <path
    d="M 42 168 C 140 128, 200 208, 320 162 C 420 128, 500 188, 598 168"
    stroke="hsl(76 100% 60%)"
    stroke-opacity="0.22"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />
  <path
    d="M 42 168 C 140 128, 200 208, 320 162 C 420 128, 500 188, 598 168"
    stroke="hsl(76 100% 60%)"
    stroke-opacity="0.45"
    stroke-width="2"
    stroke-linecap="round"
    stroke-dasharray="6 14"
    fill="none"
  />

  <!-- column guides -->
  <g opacity="0.14" stroke="hsl(76 100% 60%)" stroke-width="1">
    <path d="M106.5 52 V248 M320.5 52 V248 M534.5 52 V248" />
  </g>

  <!-- SECTION: POLICY ¯ constraint graph -->
  <text
    x="106"
    y="44"
    text-anchor="middle"
    fill="hsl(76 100% 58%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="0.2em"
  >
    POLICY
  </text>
  <g transform="translate(38, 72)" stroke-linecap="round" stroke-linejoin="round">
    <!-- edges: grey paths -->
    <path d="M 28 38 L 62 22" stroke="hsl(210 14% 32%)" stroke-width="1.5" />
    <path d="M 62 22 L 96 44" stroke="hsl(210 14% 32%)" stroke-width="1.5" />
    <path d="M 96 44 L 78 88" stroke="hsl(210 14% 32%)" stroke-width="1.5" />
    <path d="M 78 88 L 38 102" stroke="hsl(210 14% 32%)" stroke-width="1.5" />
    <!-- highlighted evaluation path -->
    <path
      d="M 28 38 L 52 72 L 92 118"
      stroke="hsl(76 100% 55%)"
      stroke-width="2"
      stroke-opacity="0.95"
    />
    <!-- nodes -->
    <circle cx="28" cy="38" r="7" fill="#0a0c10" stroke="hsl(76 100% 58%)" stroke-width="1.6" />
    <circle cx="62" cy="22" r="6" fill="#0a0c10" stroke="hsl(210 12% 38%)" stroke-width="1.3" />
    <circle cx="96" cy="44" r="6" fill="#0a0c10" stroke="hsl(210 12% 38%)" stroke-width="1.3" />
    <circle cx="78" cy="88" r="6" fill="#0a0c10" stroke="hsl(210 12% 38%)" stroke-width="1.3" />
    <circle cx="38" cy="102" r="6" fill="#0a0c10" stroke="hsl(210 12% 38%)" stroke-width="1.3" />
    <circle cx="52" cy="72" r="6.5" fill="#0a0c10" stroke="hsl(76 100% 58%)" stroke-width="1.6" />
    <circle cx="92" cy="118" r="8" fill="hsl(76 100% 58%)" fill-opacity="0.12" stroke="hsl(76 100% 58%)" stroke-width="1.8" />
  </g>
  <text
    x="106"
    y="214"
    text-anchor="middle"
    fill="hsl(210 12% 52%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="9.5"
    font-weight="500"
    letter-spacing="0.04em"
  >
    Deterministic graph
  </text>

  <!-- SECTION: IDENTITY ¯ rings + proof -->
  <text
    x="320"
    y="44"
    text-anchor="middle"
    fill="hsl(76 100% 58%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="0.2em"
  >
    IDENTITY
  </text>
  <g transform="translate(320, 138)">
    <circle r="78" stroke="hsl(210 12% 26%)" stroke-width="1.2" />
    <circle r="58" stroke="hsl(210 12% 34%)" stroke-width="1.4" />
    <circle r="38" stroke="hsl(76 100% 58%)" stroke-opacity="0.35" stroke-width="1.5" />
    <!-- passport / badge frame -->
    <rect x="-22" y="-30" width="44" height="60" rx="6" fill="#080a0e" stroke="hsl(76 100% 58%)" stroke-width="1.6" />
    <path d="M -14 -18 H 14" stroke="hsl(210 12% 40%)" stroke-width="1.2" />
    <path d="M -14 -8 H 8" stroke="hsl(210 12% 28%)" stroke-width="1.2" />
    <path d="M -14 2 H 12" stroke="hsl(210 12% 28%)" stroke-width="1.2" />
    <circle cy="18" r="9" fill="none" stroke="hsl(76 100% 58%)" stroke-width="1.5" />
    <path d="M -5 18 L -1 22 L 6 14" stroke="hsl(76 100% 58%)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text
    x="320"
    y="214"
    text-anchor="middle"
    fill="hsl(210 12% 52%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="9.5"
    font-weight="500"
    letter-spacing="0.04em"
  >
    Roles &amp; verification
  </text>

  <!-- SECTION: EXECUTION ¯ workflow + anchor -->
  <text
    x="534"
    y="44"
    text-anchor="middle"
    fill="hsl(76 100% 58%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="0.2em"
  >
    EXECUTION
  </text>
  <g transform="translate(448, 78)" stroke-linecap="round">
    <!-- workflow lanes -->
    <rect x="0" y="0" width="152" height="28" rx="6" fill="#080a0e" stroke="hsl(76 100% 50%)" stroke-opacity="0.55" stroke-width="1.2" />
    <rect x="0" y="40" width="152" height="28" rx="6" fill="#080a0e" stroke="hsl(210 12% 32%)" stroke-width="1.2" />
    <rect x="0" y="80" width="152" height="28" rx="6" fill="#080a0e" stroke="hsl(210 12% 32%)" stroke-width="1.2" />
    <rect x="0" y="0" width="5" height="28" rx="2" fill="hsl(76 100% 58%)" fill-opacity="0.85" />
    <text x="78" y="19" text-anchor="middle" fill="hsl(210 10% 62%)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.12em">SAFE PATH</text>
    <text x="78" y="59" text-anchor="middle" fill="hsl(210 10% 48%)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.12em">ESCALATED</text>
    <text x="78" y="99" text-anchor="middle" fill="hsl(210 10% 48%)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.12em">BLOCKED</text>
    <!-- anchor / chain block -->
    <path
      transform="translate(168, 34)"
      d="M 0 -22 L 19 -11 V 11 L 0 22 L -19 11 V -11 Z"
      fill="#07090c"
      stroke="hsl(76 100% 58%)"
      stroke-opacity="0.7"
      stroke-width="1.3"
    />
    <circle cx="168" cy="34" r="4" fill="hsl(76 100% 58%)" fill-opacity="0.35" />
  </g>
  <text
    x="534"
    y="214"
    text-anchor="middle"
    fill="hsl(210 12% 52%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="9.5"
    font-weight="500"
    letter-spacing="0.04em"
  >
    Routed runs &amp; evidence
  </text>

  <!-- footer band -->
  <rect x="0" y="248" width="640" height="112" fill="url(#bg)" fill-opacity="0.92" />
  <path d="M0 248 H640" stroke="hsl(210 12% 22%)" stroke-width="1" />
  <text
    x="320"
    y="288"
    text-anchor="middle"
    fill="hsl(210 8% 96%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="0.06em"
  >
    gctl
  </text>
  <text
    x="320"
    y="314"
    text-anchor="middle"
    fill="hsl(210 10% 58%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="12.5"
    font-weight="500"
    letter-spacing="0.02em"
  >
    Governed agents ¯ Observable onchain execution
  </text>
  <text
    x="320"
    y="338"
    text-anchor="middle"
    fill="hsl(210 10% 42%)"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="10"
    font-weight="500"
    letter-spacing="0.14em"
  >
    POLICY ¯ IDENTITY ¯ EXECUTION
  </text>
</svg>
